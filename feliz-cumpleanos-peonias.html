<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16241f;
    --ink-2:#1e3029;
    --blush:#f7c9d3;
    --rose:#e88aa0;
    --rose-deep:#c95d7b;
    --cream:#fdf6ee;
    --gold:#d9b36a;
    --leaf:#5f7d5a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    background:radial-gradient(120% 90% at 50% 110%, var(--ink-2) 0%, var(--ink) 60%);
    font-family:'Karla',sans-serif;
    color:var(--cream);
    display:flex;align-items:center;justify-content:center;
  }

  /* ---------- escena ---------- */
  .scene{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;display:flex;align-items:center;justify-content:center}

  .card{
    position:relative;z-index:5;text-align:center;padding:2rem;max-width:680px;
  }
  .eyebrow{
    letter-spacing:.45em;text-transform:uppercase;font-size:.72rem;color:var(--gold);
    opacity:0;animation:rise 1.2s ease 2.2s forwards;
  }
  h1{
    font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:clamp(2.6rem,8vw,5rem);line-height:1.05;margin:.6rem 0 .4rem;
    color:var(--cream);
    opacity:0;animation:rise 1.4s ease 2.6s forwards;
  }
  h1 .nombre{font-style:italic;color:var(--blush)}
  .mensaje{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:clamp(1.05rem,3vw,1.45rem);line-height:1.6;color:#e9ddcf;
    max-width:46ch;margin:0 auto;
    opacity:0;animation:rise 1.4s ease 3.2s forwards;
  }
  .firma{
    margin-top:1.4rem;font-size:.85rem;letter-spacing:.25em;text-transform:uppercase;color:var(--rose);
    opacity:0;animation:rise 1.2s ease 3.8s forwards;
  }
  .firma::before{content:"— "}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

  /* ---------- peonías ---------- */
  .peony{position:absolute;z-index:2;transform-origin:50% 100%}
  .peony svg{display:block;overflow:visible}
  .p-left  {left:-40px;bottom:-30px;width:min(40vw,340px);animation:sway 7s ease-in-out infinite}
  .p-right {right:-50px;bottom:-20px;width:min(44vw,380px);animation:sway 8.5s ease-in-out infinite reverse}
  @keyframes sway{0%,100%{rotate:0deg}50%{rotate:2.2deg}}

  /* móvil primero: flores grandes llenando la parte baja, texto más arriba */
  @media (max-width:640px){
    .card{transform:translateY(-12vh);padding:1.5rem}
    .p-left  {left:-16vw;bottom:-12vw;width:66vw}
    .p-right {right:-18vw;bottom:-8vw;width:72vw}
  }

  .petal{transform-origin:50px 95px;transform:scale(.05) rotate(var(--r));opacity:0;
    animation:bloom 1.6s cubic-bezier(.18,.7,.3,1.05) forwards;animation-delay:var(--d)}
  @keyframes bloom{
    0%{transform:scale(.05) rotate(calc(var(--r) - 28deg));opacity:0}
    60%{opacity:1}
    100%{transform:scale(1) rotate(var(--r));opacity:1}
  }
  .center-dots{opacity:0;animation:fadeIn .8s ease forwards;animation-delay:1.9s}
  .stem{stroke-dasharray:300;stroke-dashoffset:300;animation:draw 1.4s ease .2s forwards}
  .leafy{transform-origin:center;transform:scale(0);animation:leafPop .9s ease 1s forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes leafPop{to{transform:scale(1)}}
  @keyframes fadeIn{to{opacity:1}}

  /* ---------- pétalos cayendo ---------- */
  .falling{position:absolute;top:-6vh;z-index:1;width:18px;height:14px;border-radius:60% 40% 55% 45%;
    background:linear-gradient(135deg,var(--blush),var(--rose));
    opacity:.85;animation:fall linear infinite}
  @keyframes fall{
    0%{transform:translateY(-6vh) translateX(0) rotate(0deg)}
    100%{transform:translateY(112vh) translateX(9vw) rotate(540deg)}
  }

  /* ---------- luz ambiental ---------- */
  .glow{position:absolute;z-index:0;width:60vmin;height:60vmin;border-radius:50%;
    background:radial-gradient(circle,rgba(232,138,160,.16),transparent 65%);
    top:50%;left:50%;transform:translate(-50%,-55%);animation:pulse 6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}



  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01s !important;animation-delay:0s !important}
    .falling{display:none}
  }
</style>
</head>
<body>
<div class="scene">
  <div class="glow"></div>

  <!-- Peonía: plantilla SVG reutilizada por JS -->
  <div class="peony p-left" data-peony data-scale="1"></div>
  <div class="peony p-right" data-peony data-scale="1.1"></div>

  <div class="card">
    <p class="eyebrow">Un día para celebrarte</p>
    <h1>¡Feliz cumpleaños, <span class="nombre" id="nombre">para ti</span>!</h1>
    <p class="mensaje" id="mensaje">Que este nuevo año florezca como las peonías: con abundancia, alegría y momentos que perfumen todos tus días.</p>
    <p class="firma" id="firma" hidden></p>
  </div>
</div>

<script>
  // ----- peonía SVG -----
  function peonySVG(scale){
    const petals=[
      // [rotación, retraso, color]
      [-150,'.10s','#c95d7b'],[ -90,'.18s','#c95d7b'],[ -30,'.26s','#c95d7b'],
      [  30,'.34s','#c95d7b'],[  90,'.42s','#c95d7b'],[ 150,'.50s','#c95d7b'],
      [-120,'.70s','#e88aa0'],[ -60,'.78s','#e88aa0'],[   0,'.86s','#e88aa0'],
      [  60,'.94s','#e88aa0'],[ 120,'1.02s','#e88aa0'],
      [ -75,'1.25s','#f7c9d3'],[ -15,'1.33s','#f7c9d3'],[  45,'1.41s','#f7c9d3'],[ 105,'1.49s','#f7c9d3']
    ];
    let petalEls = petals.map(([r,d,c])=>
      `<path class="petal" style="--r:${r}deg;--d:${d}"
        d="M50 95 C 28 70, 30 30, 50 18 C 70 30, 72 70, 50 95 Z"
        fill="${c}" stroke="rgba(0,0,0,.12)" stroke-width="1"/>`).join('');
    return `<svg viewBox="-30 -20 160 220" style="transform:scale(${scale})">
      <path class="stem" d="M50 95 C 48 130, 55 160, 50 200" fill="none" stroke="#5f7d5a" stroke-width="5" stroke-linecap="round"/>
      <path class="leafy" d="M50 150 C 30 140, 18 145, 10 160 C 26 166, 42 162, 50 150 Z" fill="#5f7d5a"/>
      <path class="leafy" d="M51 130 C 70 122, 84 126, 92 140 C 76 147, 60 142, 51 130 Z" fill="#6f8d68" style="animation-delay:1.15s"/>
      ${petalEls}
      <g class="center-dots">
        <circle cx="50" cy="60" r="7" fill="#f3d27e"/>
        <circle cx="44" cy="55" r="3" fill="#d9b36a"/>
        <circle cx="57" cy="56" r="3" fill="#d9b36a"/>
        <circle cx="50" cy="67" r="3" fill="#d9b36a"/>
      </g>
    </svg>`;
  }
  document.querySelectorAll('[data-peony]').forEach(el=>{
    el.innerHTML = peonySVG(el.dataset.scale||1);
  });

  // ----- pétalos cayendo -----
  const scene=document.querySelector('.scene');
  const N = innerWidth < 600 ? 14 : 24;
  for(let i=0;i<N;i++){
    const p=document.createElement('div');
    p.className='falling';
    p.style.left = Math.random()*100+'vw';
    p.style.animationDuration = (7+Math.random()*8)+'s';
    p.style.animationDelay = (Math.random()*10)+'s';
    p.style.opacity = .35+Math.random()*.5;
    p.style.transform = `scale(${.6+Math.random()*.9})`;
    scene.appendChild(p);
  }

  // ----- dedicatoria por URL -----
  const q=new URLSearchParams(location.search);
  const esc=s=>s.replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  if(q.get('para')) document.getElementById('nombre').textContent=q.get('para');
  if(q.get('msg'))  document.getElementById('mensaje').textContent=q.get('msg');
  if(q.get('de')){
    const f=document.getElementById('firma');
    f.textContent='Con cariño, '+q.get('de');
    f.hidden=false;
  }
  if(q.get('para')) document.title='¡Feliz cumpleaños, '+q.get('para')+'! 🌸';
</script>
</body>
</html>
