    ];

    // ═══════════════════════════════════════════════════════
    // AIRTABLE — cargar cantos guardados
    // ═══════════════════════════════════════════════════════
    var AT_TOKEN = 'patJxB4Jkw1GK19XJ.e9baed267c8647649bfcd7a3af57756a224282e5e8033009575ca961888c3628';
    var AT_BASE  = 'appyn3FuqAu63Ak0j';
    var AT_TABLE = 'Estructuras';
    var cantosAirtable = [];   // {nombre, href}
    var airtableCargado = false;

    function cargarAirtable(){
      var st = document.getElementById('at-status');
      if(st) st.style.display = 'block';

      // Traer solo campos Name (no necesitamos EstructuraJSON para buscar)
      var url = 'https://api.airtable.com/v0/' + AT_BASE + '/' + encodeURIComponent(AT_TABLE)
              + '?fields[]=Name&fields[]=Tipo';

      fetch(url, { headers:{ 'Authorization':'Bearer '+AT_TOKEN } })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(data.records){
          cantosAirtable = data.records
            .filter(function(r){ return r.fields && r.fields.Name; })
            .map(function(r){
              return {
                nombre: r.fields.Name,
                href: '/ver_canto.html?nombre='+encodeURIComponent(r.fields.Name),
                esAirtable: true
              };
            });
        }
        airtableCargado = true;
        if(st) st.style.display = 'none';
      })
      .catch(function(){
        // Falla silenciosamente — el array local sigue funcionando
        airtableCargado = true;
        if(st) st.style.display = 'none';
      });
    }

    // ═══════════════════════════════════════════════════════
    // BÚSQUEDA COMBINADA
    // ═══════════════════════════════════════════════════════
    function buscar(query){
      query = query.toLowerCase().trim();
      if(!query) return;

      // Combinar: Airtable primero, luego locales que no estén ya en Airtable
      var nombresAirtable = cantosAirtable.map(function(c){ return c.nombre.toLowerCase(); });

      // Filtrar locales que NO tienen versión en Airtable
      var soloLocales = cancionesLocales.filter(function(c){
        return !nombresAirtable.includes(c.nombre.toLowerCase());
      });
      soloLocales = soloLocales.map(function(c){
        return { nombre: c.nombre, href: c.href, esAirtable: false };
      });

      var todos = cantosAirtable.concat(soloLocales);

      // Quitar duplicados por nombre (mantener el primero = Airtable tiene prioridad)
      var vistos = {};
      todos = todos.filter(function(c){
        var key = c.nombre.toLowerCase();
        if(vistos[key]) return false;
        vistos[key] = true;
        return true;
      });

      // Ordenar alfabéticamente
      todos.sort(function(a,b){
        return a.nombre.localeCompare(b.nombre,'es',{sensitivity:'base'});
      });

      // Filtrar por búsqueda parcial
      var matches = todos.filter(function(c){
        return c.nombre.toLowerCase().includes(query);
      });

      if(matches.length === 0){
        Swal.fire({
          title: 'No encontrado',
          text: 'No hay cantos que coincidan con "'+query+'".',
          icon: 'info'
        });
        return;
      }

      var htmlContent = '<ul style="text-align:left;padding:0 8px;">';
      matches.forEach(function(c){
        var badge = c.esAirtable
          ? '<span class="badge-at">activo</span>'
          : '<span class="badge-local">Local</span>';
        htmlContent += '<li style="margin:8px 0;list-style:none;">'
          + '<a href="'+c.href+'" style="color:#003366;font-weight:600;text-decoration:none;font-size:15px;">'
          + c.nombre + '</a>' + badge + '</li>';
      });
      htmlContent += '</ul>';

      Swal.fire({
        title: 'Resultados ('+ matches.length +')',
        html: htmlContent,
        showCloseButton: true,
        width: 500
      });
    }

    // ═══════════════════════════════════════════════════════
    // EVENTOS
    // ═══════════════════════════════════════════════════════
    document.getElementById('buscadorForm').addEventListener('submit', function(e){
      e.preventDefault();
      buscar(document.getElementById('query').value);
    });

    function directoras(){
      window.location.href = 'TABLA_CANTOS.html';
    }

    // Arrancar carga de Airtable al abrir la página
    window.addEventListener('load', cargarAirtable);
    </script>
